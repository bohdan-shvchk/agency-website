name: Daily Blog Post

on:
  schedule:
    - cron: "0 5 * * *"  # 7:00 CEST (UTC+2)
  workflow_dispatch:      # manual run button in GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_blog.py

      - name: Commit and push
        run: |
          git config user.name "blog-bot"
          git config user.email "bot@shvchk.agency"
          git add src/content/blog/
          git diff --cached --quiet || git commit -m "feat: add daily blog post $(date +%Y-%m-%d)"
          git push
